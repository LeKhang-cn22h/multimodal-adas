version: "3.9"

# =====================================================================
# MULTIMODAL-ADAS — Docker Compose (Local Dev / Full Stack)
#
# Kiến trúc distributed thực tế:
#   Máy A (driver-service)  → kết nối về aggregator qua network
#   Máy B (lane-service)    → kết nối về aggregator
#   Máy MẠNH (api-gateway + aggregator + dashboard)
#
# File này chạy TẤT CẢ trên 1 máy để develop/test.
# Xem docker-compose.driver.yml / docker-compose.gateway.yml
# để deploy từng phần lên từng máy thành viên.
# =====================================================================

networks:
  adas-net:
    driver: bridge

services:

  # ─── API Gateway (máy mạnh chạy cái này) ─────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: adas-api-gateway
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DRIVER_SERVICE_URL:    http://driver-service:8001
      LANE_SERVICE_URL:      http://lane-service:8002
      AGGREGATOR_SERVICE_URL: http://aggregator-service:8003
      VEHICLE_SERVICE_URL:   http://vehicle-service:8004
      CAMERA_SERVICE_URL:    http://camera-service:8005
    depends_on:
      - aggregator-service
    networks:
      - adas-net
    restart: unless-stopped

  # ─── Aggregator (máy mạnh chạy cái này) ──────────────────────────
  aggregator-service:
    build:
      context: ./services/aggregator-service
    container_name: adas-aggregator
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
    networks:
      - adas-net
    restart: unless-stopped

  # ─── Driver Service ───────────────────────────────────────────────
  driver-service:
    build:
      context: ./services/driver-service
    container_name: adas-driver
    ports:
      - "8001:8001"
    environment:
      EAR_THRESHOLD: ${EAR_THRESHOLD:-0.22}
      DROWSY_FRAMES: ${DROWSY_FRAMES:-60}
      CAMERA_ID: ${CAMERA_ID:-0}
      AGGREGATOR_URL: http://aggregator-service:8003/event
      DISPLAY: ${DISPLAY:-:0}
    networks:
      - adas-net
    depends_on:
      - aggregator-service
    restart: unless-stopped

  # ─── Lane Service (placeholder) ───────────────────────────────────
  lane-service:
    build:
      context: ./services/lane-service
    container_name: adas-lane
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      AGGREGATOR_URL: http://aggregator-service:8003/event
    networks:
      - adas-net
    depends_on:
      - aggregator-service
    restart: unless-stopped

  # ─── Vehicle Service (placeholder) ────────────────────────────────
  vehicle-service:
    build:
      context: ./services/vehicle-service
    container_name: adas-vehicle
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      AGGREGATOR_URL: http://aggregator-service:8003/event
    networks:
      - adas-net
    depends_on:
      - aggregator-service
    restart: unless-stopped

  # ─── Camera Service (run natively on Windows, NOT in Docker) ────
  # Camera không thể truy cập webcam từ Docker trên Windows.
  # Chạy camera-service trực tiếp trên máy:
  #   cd services/camera-service
  #   pip install -r requirements.txt
  #   python main.py
  # camera-service:
  #   build:
  #     context: ./services/camera-service
  #   container_name: adas-camera
  #   ports:
  #     - "8005:8005"
  #   environment:
  #     PORT: 8005
  #   networks:
  #     - adas-net
  #   restart: unless-stopped

  # ─── Video Service (placeholder) ──────────────────────────────────
  video-service:
    build:
      context: ./services/video-service
    container_name: adas-video
    ports:
      - "8006:8006"
    environment:
      PORT: 8006
      AGGREGATOR_URL: http://aggregator-service:8003/event
    networks:
      - adas-net
    depends_on:
      - aggregator-service
    restart: unless-stopped
